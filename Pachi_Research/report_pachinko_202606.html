### ④ eソードアート・オンライン オルタナティブ ガンゲイル・オンライン（大都技研）

![eソードアート・オンライン GGO 筐体](pachinko/images/04_sao_ggo/cabinet.jpg)
![eソードアート・オンライン GGO ゲームフロー](pachinko/images/04_sao_ggo/game_flow.jpg)
![eソードアート・オンライン GGO 大当り詳細](pachinko/images/04_sao_ggo/hit_rate.jpg)

**原作IP：** ライトノベル/動畫「ソードアート・オンライン オルタナティブ ガンゲイル・オンライン」（時雨沢恵一 著、原案：川原礫）

**賣點與好玩之處：**
- 通常時1/319.9的ミドル規格，初當有一定的挑戰性
- 初當後100% ST突入（含LT直行3%），不存在「當了卻直接回通常」的挫折
- ST 50回転突破率約40%，突破即獲得3600個出玉＋RUSH突入
- RUSH（SJ RUSH）為ST 160回転、繼續率約80%的高安定型
- RUSH突入時期待獲得出玉約12300個的高回報設計
- 8種演出模式（表4種＋裏4種）×12種カスタム＝96種遊玩組合
- 先バレ、落ちブル、マズルフラッシュ等多樣化告知カスタム
- RUSH中出玉種類豐富（300～3600個），30%機率獲得最高3600個
- 特殊狀態搭載：特定條件下大當出玉3600個濃厚
- SQUAD JAM BONUS BURST 的5種出玉告知演出讓每次大當都有驚喜
- 大都技研招牌的先バレ演出＋レン役物的精緻互動

**中心思想：**
> 「確定ST的安心感＋96種演出組合的探索深度」— 以「初當後必定有機會挑戰RUSH」為基礎安心感，加上業界最多級的演出カスタム組合（96種），讓玩家在同一台機器上能持續發現新的遊玩方式。GGO原作中「在虛擬世界中尋找自我」的主題，被轉化為「在多樣的演出模式中找到最適合自己的遊玩風格」的遊戲設計哲學。

**套用至其他遊戲的可能性：**
- 射擊遊戲的「確定進場→挑戰突破→高回報連戰」三段式循環設計
- 手遊的「百變自定義介面」— 讓玩家深度個人化遊戲體驗提升留存
- Battle Royale 遊戲的「小隊戰鬥＋個人風格」系統
- RPG 的「裝備組合×技能配置＝無限Build」深度探索設計
- 線上遊戲的「保底機制＋突破挑戰＋連勝獎勵」漸進式回報結構

**Slot Game 轉用分析：**

- **確定 Free Spin 突入＋突破挑戰型 Bonus（100% Trigger → 40% Break-through）**
  「初當後100% ST突入→40%突破率→突破即大獎」的三段式設計，可轉化為 Slot 的「確定 Free Spin 觸發系統」：Scatter 3個觸發 Bonus 時，不直接給獎金，而是進入「突破挑戰 Free Spin」（相當於 SJ JUDGE 的50回転）。在這個短期 Free Spin 中（例如5轉），每轉有 ~15% 機率觸發「突破」— 合計約40%整體突破率。突破成功則直接進入「主力 Free Spin」且保證一次 1000x 以上的大獎；突破失敗則獲得小額安慰獎（相當於初當300個出玉的 GUN GALE BONUS）。關鍵設計哲學：玩家永遠不會「什麼都沒得到」，但真正的大獎需要通過第二關挑戰。

  **舉例：** 玩家集滿 3 個 Scatter，畫面切入 SJ JUDGE 風格的倒數場景 —「50 SPINS REMAIN」。每一轉都有小型戰鬥動畫（レン vs 敵人），命中特殊符號組合代表「突破」。第 23 轉時，畫面爆出「BREAK THROUGH！」紅色大字，直接跳轉至主力 Free Spin 並立即獲得 1000x 保底獎金。如果 50 轉內未突破，玩家仍帶走過程中累積的小獎（約 30-50x），不至於完全空手而歸。這個「確定有機會＋需要突破」的設計，既保留了挑戰的刺激感，又消除了「Scatter 白觸發」的挫折。

- **96 種演出組合型遊玩個人化系統（Player Profile Customization）**
  對應「8種演出模式×12種カスタム＝96種組合」的深度自定義設計：在 Slot 中可設計為「遊玩風格選擇器」— 玩家可以從多種維度自定義自己的遊戲體驗：(1) 視覺主題（角色主題切換）、(2) 告知方式（即時告知/後告知/先讀み型）、(3) 音效風格（原作BGM/戰鬥系/沉浸系）、(4) 倍率表現（直接顯示數字/動畫演出/驚喜後置）。這些選擇不影響 RTP 或中獎機率，純粹是體驗個人化，但能大幅提升玩家的「所有權感」和長期留存率。

  **舉例：** 遊戲首次啟動時，レン（主角）問玩家：「あなたのプレイスタイルは？」然後展開設定面板。玩家選擇「ピトフーイ模式」（告知方式＝後置型驚喜）＋「マズルフラッシュ」（視覺提示＝槍口閃光暗示中獎等級）。從此以後，每次接近中獎時畫面下方會有微弱閃光預告，而實際獎金數字要等到動畫結束才揭曉。另一個玩家可能選了「フカ次郎模式」（即時型＝按鈕震動告知），體驗完全不同。兩人在同一台遊戲上獲得截然不同的感受，各自找到最舒適的遊玩節奏。

**Fish Game 轉用分析：**

- **Squad Jam 團隊模式（4人組隊突破 Boss 關卡）**
  「SJ JUDGE→SJ RUSH」的兩段式系統轉化為捕魚機的「團隊突破關卡」：每隔固定時間（如10分鐘），場上會出現「SQUAD JAM 挑戰」— 系統隨機將4位玩家編為一組（對應GGO中的小隊戰）。小隊需要在50秒內合力擊殺一隻高HP的 Boss 魚（對應ST 50回転的突破挑戰）。如果成功擊殺（約40%成功率，依 Boss 難度），全隊進入「SJ RUSH 模式」— 接下來160秒內場上魚群價值全部翻倍＋出現稀有高價值魚。失敗的隊伍仍獲得參與獎勵（基本擊殺分）。

  **舉例：** 畫面突然響起警報「SQUAD JAM START！」，系統顯示「Your Squad: Player A, B, C, D」。一隻巨大的機械龍魚（SJ Boss）從畫面中央浮現，HP 條 8000。四人集中火力猛攻，倒數計時 50 秒...最後 3 秒 HP 剩 200，Player C 切換至最強火力一發擊殺！「SQUAD JAM CLEAR！→ SJ RUSH 160s！」全場歡呼，接下來的 160 秒內金色稀有魚不斷湧現。那種「四人合力達成」的達成感無與倫比。

- **武器カスタム系統（砲台個人化＝遊玩風格多樣化）**
  對應「96種演出組合」的自定義深度，設計為捕魚機的「武器カスタム系統」：玩家可以從多種砲台類型中自由選擇和切換 —（1）P90型（高射速低單發傷害，適合掃小魚群）、（2）狙撃型（低射速高單發傷害，適合瞄準大魚）、（3）擴散型（範圍攻擊，適合密集魚群）、（4）穿透型（貫穿攻擊，適合魚群排列時連鎖擊殺）。每種類型還可搭配「彈藥升級」（火/冰/電屬性，對特定魚種有額外傷害）。組合自由度高讓每個玩家都能找到自己的最佳打法。

  **舉例：** 玩家在遊戲介面看到武器選擇面板：レン最愛的粉紅色 P90（高射速）、エム的巨大盾牌砲（防禦射擊＝射擊同時減少自身彈藥消耗）、ピトフーイ的光劍砲（近距離超高傷害但射程短）、フカ次郎的雙持擴散砲。選擇後還能裝備「冰屬性彈藥」讓被擊中的魚減速。場上另一位玩家用狙撃型＋火屬性專打Boss，而自己用P90＋冰彈控場掃小魚 — 不同風格互補合作，體驗完全不同。

| eソードアート・オンライン GGO | 確定機會＋深度自定義 | ★★★★★ | 射擊遊戲、BR、RPG Build系統 |

**本月最具亮點的新設計：** eソードアート・オンライン GGO 的「100% ST突入→40%突破→高回報RUSH」三段式設計。與近期流行的「一擊特化型」（東京喰種超デカ）形成明確的差異化定位 —「不追求一擊9000個的極端射幸性，而是以80%繼續率的RUSH安定感取勝」。這種「寬進口＋突破關卡＋安定連莊」的結構，在商業遊戲中對應的就是「確定保底→挑戰升級→連續獎勵」的玩家友善設計。

**排名結構分析：** TOP3 連續兩個月未變動（東京喰種超デカ、東京喰種、リコリス），顯示當前パチンコ市場的「頭部固化」趨勢明顯。新台要突破既有格局需要極強的IP力或革新性規格設計。SAO GGO 能以新台之姿殺入TOP4，歸功於SAO品牌力＋大都技研的演出品質＋「確定ST」這個玩家友善的差異化賣點。

**長期稼動趨勢：** eリコリス・リコイル（3個月）、e 東京喰種（14個月以上）持續證明「適度規格＋高品質演出＋角色魅力」是長期稼動的黃金公式。e 東京喰種的14個月長青表現尤其驚人，在遊戲設計中等同於「Day 1 留存率轉化為 Year 1 留存率」的教科書案例。

<script>
const content = document.getElementById('content');
const toc = document.getElementById('toc');
const btnToc = document.getElementById('btn-toc');
const btnTop = document.getElementById('btn-top');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

function buildTOC() {
  const headings = content.querySelectorAll('h1,h2,h3');
  if (!headings.length) { toc.style.display = 'none'; return; }
  let s = '<h3>目次</h3>';
  headings.forEach((el, i) => {
    const id = 'h-' + i; el.id = id;
    const lv = el.tagName.toLowerCase();
    const t = el.textContent.length > 35 ? el.textContent.slice(0, 35) + '...' : el.textContent;
    s += '<a href="#' + id + '" class="toc-' + lv + '">' + t + '</a>';
  });
  toc.innerHTML = s;
}

function wrapAnalysisSections() {
  const paragraphs = content.querySelectorAll('p');
  paragraphs.forEach(p => {
    const strong = p.querySelector('strong');
    if (!strong) return;
    const text = strong.textContent;
    let className = null;
    if (text.includes('Slot Game 轉用分析')) className = 'slot-analysis';
    else if (text.includes('Fish Game 轉用分析')) className = 'fish-analysis';
    if (!className) return;
    const wrapper = document.createElement('div');
    wrapper.className = className;
    let sibling = p.nextElementSibling;
    const collected = [];
    while (sibling && !['H2','H3','HR'].includes(sibling.tagName) && !sibling.querySelector('strong[class]')) {
      const strongInside = sibling.querySelector('strong');
      if (strongInside && (strongInside.textContent.includes('Slot Game 轉用分析') || strongInside.textContent.includes('Fish Game 轉用分析'))) break;
      collected.push(sibling);
      sibling = sibling.nextElementSibling;
    }
    p.parentNode.insertBefore(wrapper, p);
    wrapper.appendChild(p);
    collected.forEach(el => wrapper.appendChild(el));
  });
}

function wrapExamples() {
  content.querySelectorAll('strong').forEach(strong => {
    if (!strong.textContent.includes('舉例')) return;
    const p = strong.closest('p');
    if (!p || p.closest('.example-block')) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'example-block';
    p.parentNode.insertBefore(wrapper, p);
    wrapper.appendChild(p);
  });
}

function render() {
  const mdEl = document.getElementById('report-md');
  if (!mdEl) return;
  let html = marked.parse(mdEl.textContent);
  content.innerHTML = html;
  content.querySelectorAll('img').forEach(img => {
    img.loading = 'lazy';
    img.onerror = function() {
      const e = document.createElement('span');
      e.className = 'img-error';
      e.textContent = '\u26A0 ' + img.getAttribute('src');
      img.parentNode.insertBefore(e, img.nextSibling);
      img.style.display = 'none';
    };
    img.onclick = () => { lightboxImg.src = img.src; lightbox.classList.add('active'); };
  });
  wrapAnalysisSections();
  wrapExamples();
  buildTOC();
}

btnToc.addEventListener('click', () => toc.classList.toggle('active'));
lightbox.addEventListener('click', () => lightbox.classList.remove('active'));
window.addEventListener('scroll', () => btnTop.classList.toggle('visible', window.scrollY > 400));
btnTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

render();

// Hash-based scroll: scroll to heading containing the hash text
function scrollToHash() {
  const hash = decodeURIComponent(window.location.hash.slice(1));
  if (!hash) return;
  const normalizedHash = hash.replace(/[\s\-]+/g, '');
  const headings = content.querySelectorAll('h1,h2,h3');
  for (const el of headings) {
    const normalizedText = el.textContent.replace(/[\s\-]+/g, '');
    if (normalizedText.includes(normalizedHash)) {
      setTimeout(() => {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        el.style.transition = 'background 0.3s';
        el.style.background = '#fff3cd';
        setTimeout(() => { el.style.background = ''; }, 2000);
      }, 300);
      return;
    }
  }
}
scrollToHash();
window.addEventListener('hashchange', scrollToHash);
</script>
