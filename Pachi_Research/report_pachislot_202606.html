## 3. 各機種賣點・中心思想・遊戲設計分析

### ① L戦国乙女5 業火を穿つ宿焔の双刃（オリンピア）

![L戦国乙女5 筐体](pachislot/images/07_sengoku_otome5/cabinet.jpg)
![L戦国乙女5 ゲームフロー](pachislot/images/07_sengoku_otome5/game_flow.jpg)
![L戦国乙女5 ボーナス出現率](pachislot/images/07_sengoku_otome5/hit_rate.jpg)

**系列背景：** 戦国乙女系列第5作，以戰國時代武將女體化為主題的長壽人氣系列

**賣點與好玩之處：**
- 通常時以周期制管理AT當選（最大6周期/999G，設定變更後4周期/650G短縮）
- 強カワチャンス：約1/36.8的周期ゲーム數加算ゾーン，ノーマル/ハイ兩種模式
- 巫女ポイント：999pt減算制，0pt到達時約20%觸發乙女アタック（CZ）
- 乙女ストラップモード：6種隱藏模式（ゴエモン/ノブナガ/ヒデヨシ/カンスケ/ミツヒデ/ヨシテル），AT當選前持續有效
- 乙女アタック（CZ）：2G×10回合的戰鬥型CZ，期待度約52%，多勝可累積出陣ボーナス
- AT「強カワラッシュ」：初期45G＋α，純增約2.7枚/G，ゲーム數管理型
- 本能寺の変（AT中CZ）：4G＋α，宿焔目停止（約1/3.2）で勝利，勝利率約50%
- 出陣ボーナス：20G的擬似ボーナス，12名乙女各有獨特上乗せ性能（平均24G～422G）
- 決戦ノ刻：CZ累計勝利後觸發的上位CZ權利爭奪戰，勝率約55%
- 上位AT「真強カワラッシュ」：純增約4.8枚/G，初期100G＋α
- 夢幻：10G的毎ゲーム上乗せ特化ゾーン，宿焔目成立時フリーズ可獲100G以上
- エンディング後進入剣聖チャンス（上位CZ），形成高次元循環

**中心思想：**
> 「乙女出陣＝角色決定命運的華麗賭注」— 以「出陣する乙女」為核心概念，同一個ボーナス由哪位乙女出陣完全改變上乗せ性能（24G～422G的巨大差異）。出陣チャンス的パネル選擇系統讓玩家體驗「命運輪盤」的緊張感，而ロゴ色（黑→綠→赤→紫）的逐步升級則對應「從雑兵到名將」的成長弧線。本能寺の変的連戦系統完美重現了戰國時代「連戰連勝→天下統一」的爽快感。


**套用至其他遊戲的可能性：**
- RPG的「同伴召喚」系統 — 每次召喚不同角色，戰鬥性能完全不同
- 卡牌遊戲的「領袖技能」概念 — 隊長決定整隊的戰鬥方式
- MOBA的「英雄選擇」機制 — 選角決定整場遊戲的節奏與策略
- 格鬥遊戲的「角色切換」— 不同角色帶來截然不同的手感
- 策略遊戲的「將領系統」— 派遣不同將領影響戰役結果

**Slot Game 轉用分析：**

- **角色決定 Free Spin 規則**
  出陣チャンス的「パネル選擇決定乙女＝決定ボーナス性能」概念，可轉化為 Slot 的 Free Spin 觸發系統。觸發 Free Spin 時，畫面出現5張角色卡牌依序翻轉（對應出陣チャンス的パネル滑動），停在哪張卡牌就由該角色主導本輪 Free Spin 的規則。例如：劍士角色 → 每轉都有機率觸發「斬擊」（消除一整列並重新落下）；弓手角色 → Wild 出現時會「射穿」整行（Expanding Wild）；魔法師角色 → Free Spin 結束時將所有中獎金額 ×2 再結算。更高階的「雙人出陣」則是同時獲得兩個角色的規則疊加。

  **舉例：** 玩家觸發 Free Spin 後，5張角色卡牌開始像走馬燈一樣旋轉。Spin 停在第4張 —「ノブナガ」登場！本輪規則：所有中獎金額自動 ×3，但 Free Spin 只有5轉（高風險高回報型）。玩家第2轉就出現大獎組合，×3 後直接拿到 150x 的獎金！但如果停在第1張「ヒデヨシ」，規則是 15轉但倍率只有 ×1（穩定低賠型）。角色的「稀有度」就像原作的パネル色（青→綠→赤→紫），越稀有的角色規則越強力。

- **連勝累積升級報酬**
  本能寺の変の「連戦＋報酬ランク昇格」系統，可轉化為 Slot 的「連續觸發 Bonus 時報酬遞增」機制。每次觸發 Bonus Round 時，如果是「連續觸發」（例如 Bonus 結束後10轉內再次觸發），報酬等級 +1（最多7級）。等級越高，Free Spin 的轉數越多、倍率越高、特殊符號越容易出現。連續6次觸發後進入「決戦ノ刻」— 一個超高期待度的特殊 Bonus，成功則進入最高等級的 Super Mode。

  **舉例：** 玩家觸發了第一次 Bonus（Rank 1：10轉 Free Spin）。結束後第5轉又觸發了！連續觸發 → Rank 2（12轉＋×2 倍率）。又在 Bonus 結束後第8轉觸發 → Rank 3（15轉＋×3 倍率＋Sticky Wild）。玩家心想「再連2次就能進入決戦ノ刻了！」— 這種「越連越強」的設計讓玩家在每次 Bonus 結束後都處於「下一轉可能又觸發」的高度期待狀態。

**Fish Game 轉用分析：**

- **將領系統改變砲台特性**
  12名乙女的差異化性能可轉化為「將領系統」：玩家可裝備不同將領卡牌，每位將領改變砲台的基礎特性。例如：ユウサイ將領 → 每發子彈附帶「穿透」效果（可打穿前排魚打到後排）；ノブナガ將領 → 攻擊力大幅提升但射速降低；ドウセツ將領 → 一定機率觸發「フリーズ」（畫面全魚停止1秒讓你自由瞄準）。將領卡牌有稀有度（N→R→SR→SSR），對應原作的パネル色系統。

  **舉例：** 玩家裝備了 SR 級「イエヤス」將領 — 砲台特性變為「每3發必中」（命中率大幅提升，但單發傷害降低）。適合打密集小魚群快速累積獎金。突然場上出現 Boss 魚，玩家切換為 SSR 級「ユウサイ」將領 — 砲台變為「單發高傷害＋穿透」，一發子彈穿過小魚直接命中 Boss！將領的切換時機成為策略核心。

- **連戰模式＋領地擴張**
  本能寺の変的連戰系統可轉化為「領地戰」：場上分為多個區域，玩家擊殺某區域的所有魚後「佔領」該區域，佔領的區域會自動產生金幣（被動收入）。連續佔領多個區域形成「連戰」，獎勵倍率隨佔領數遞增。但如果太久沒有新佔領，已佔領的區域會「叛變」（新魚群出現），需要重新清理。這創造了「攻城掠地」的戰國感。

  **舉例：** 玩家清空了左下區域的魚群 —「領地佔領！」該區域變為自己的顏色，每秒自動產生 5 金幣。立刻轉向右側區域繼續掃射 — 10秒內再次清空！「連戰 ×2！」獎勵倍率加倍，右側區域每秒產生 10 金幣。正要攻打中央區域時，左下區域亮起警告 —「叛軍出現！」新魚群開始填充。玩家必須決策：是繼續進攻中央（維持連戰倍率但可能失去左下），還是回防左下（中斷連戰但保住領地）？

### ② スロット ソードアート・オンラインⅡ（パオン・ディーピー）

![スロット SAO Ⅱ 筐体](pachislot/images/08_sao2/cabinet.jpg)
![スロット SAO Ⅱ ゲームフロー](pachislot/images/08_sao2/game_flow.jpg)
![スロット SAO Ⅱ ボーナス出現率](pachislot/images/08_sao2/hit_rate.jpg)

**原作IP：** 動畫「ソードアート・オンラインⅡ」GGO（ガンゲイル・オンライン）篇

**賣點與好玩之處：**
- バレットサークルシステム：リール上に出現するサークル内に図柄が停止すると恩恵獲得（本機最大獨創要素）
- 通常時はゲーム數消化＋バレットカウンター（共通ベル7個でCZ抽選）でCZを目指す
- シューティングチャージ：4種類の加算ゾーン（1～6個のバレットサークル＋2G～無限継続）
- GGOモード：4種隱藏模式（キリト/詩乃/シノン/死銃）各有獨特恩恵，機械割100%超保證
- CZ「スコードロンバトル」：前半10G弾痕收集＋後半4Gジャッジ，期待度約55%
- AT「バレットオブバレッツ」：差枚數管理型，初期150枚＋α，純增約3.6枚/G
- スナイパーチャンス：AT中CZ，約1/54，成功率50%，最大3回クリアで上位CZ權利
- 上位CZ「デス・ガンバトル」：成功率約50%，勝利で特化ゾーン→上位AT
- 上位AT「バレットオブバレッツフルダイブ」：純增約7.2枚/G，全上乗せ3桁超，期待枚數約3000枚
- ウルティマ状態：上位AT時約50%突入，デス・ガンバトル成功率大幅UP
- 絶剣：最強特化ゾーン，2200枚＋1100枚ループ上乗せ，ほぼ完走濃厚
- 豐富的カスタム機能（キャラ7種/ナビボイス35種/楽曲14曲）

**中心思想：**
> 「狙擊的一瞬＝バレットサークルに賭ける緊張感」— 以「狙撃手シノン」為核心，將パチスロの「図柄停止」行為轉化為「射撃」的體驗。バレットサークルシステム讓每一轉都有「瞄準→射撃→命中判定」的即時感，而非傳統的「回す→待つ」被動體驗。スナイパーチャンスの3段階撃破→デス・ガン対決→上位AT的流程，完美對應原作GGO篇中「予選→本戦→最終決戦」的敘事結構。ウルティマ状態的存在讓「一度到達頂點後更容易維持」，重現了キリト在GGO中覺醒後的無雙感。

**套用至其他遊戲的可能性：**
- FPS的「精準射擊獎勵」系統 — 命中特定位置給予額外報酬
- 節奏遊戲的「判定框」概念 — 音符落在特定區域才算Perfect
- 動作遊戲的「弱點攻擊」機制 — 瞄準特定部位造成暴擊
- 彈幕遊戲的「擦彈」系統 — 子彈越接近才閃避獲得越高分數
- 射擊遊戲的「連殺獎勵（Kill Streak）」— 連續命中獲得越來越強的武器

**Slot Game 轉用分析：**

- **射擊判定框系統（Bullet Circle Slot）**
  バレットサークルシステムの「リール上の特定位置に図柄が止まれば恩恵」概念，可直接轉化為 Slot 的創新機制：Spin 前，畫面上隨機出現1～6個「照準圈」覆蓋在轉輪的特定位置上。轉輪停止後，如果有任何符號剛好停在照準圈內，就觸發額外獎勵（一般符號 → 小獎金 / Wild 符號停入 → 大獎金或觸發 Feature）。照準圈的數量和位置每轉都變，創造出「這轉有6個照準圈覆蓋了大半畫面！超有機會！」的獨特期待感。

  **舉例：** 本轉畫面上出現了4個紅色照準圈，分布在第2列上段、第3列中段、第4列下段、第5列中段。轉輪開始旋轉...停！第3列中段停了一個 Wild — 正好在照準圈內！「BULLET HIT! ×5 MULTIPLIER!」不只 Wild 本身的替代功能生效，還額外獲得 ×5 倍率加成。如果同一轉有多個符號命中照準圈，倍率還會疊加。玩家的視線從「看中獎線」變成「看照準圈」— 一個全新的視覺焦點。

- **3段階任務進度條**
  スナイパーチャンス3回クリア→デス・ガンバトル→上位AT 的結構，可轉化為 Slot 的「任務進度系統」：畫面上方有一條3格的進度條。每次成功完成 Bonus Round 中的特定任務（例如：Bonus 中出現3個以上 Wild），進度條 +1格。集滿3格後觸發「Boss Battle Feature」— 一個超高報酬的特殊 Bonus，成功則進入 Super Mode（對應上位AT）。進度條跨 Session 保存（退出遊戲再回來仍保留），創造長期目標感。

  **舉例：** 玩家進入 Free Spin，任務顯示「本輪中出現3個以上 Scatter 即完成任務」。Free Spin 期間出現了4個 Scatter！「MISSION COMPLETE! [2/3]」進度條推進到第2格。下次再成功完成1個任務就能觸發 Boss Battle！玩家即使今天運氣不好，看到進度條 [2/3] 也會想「明天再來一定要觸發 Boss Battle」— 這就是跨 Session 進度條的留存力。

**Fish Game 轉用分析：**

- **照準圈瞄準系統**
  バレットサークルの「特定位置判定」概念可轉化為 Fish Game 的「照準強化」機制：畫面上隨機出現照準圈（持續3～5秒），如果玩家在照準圈消失前擊殺圈內的魚，獲得倍率獎勵（圈越小 → 倍率越高）。這增加了「瞄準精度」的技術要素，也創造了「照準圈出現在高價值魚身上！快打！」的刺激時刻。多個照準圈同時出現時，需要快速判斷打哪個CP值最高。

  **舉例：** 場上游著各種魚，突然出現3個照準圈 — 一個大圈（×2）在一群小魚上，一個中圈（×5）在一隻中型魚上，一個小圈（×10）精準套在一隻稀有魚的頭部。玩家只有4秒決定！選擇瞄準小圈的稀有魚 — 射擊！命中！「PRECISION KILL! ×10!」稀有魚本身的倍率 ×10 再 ×10 = 100倍獎金！如果手抖miss了...照準圈消失，機會不再。這就是「狙擊的一瞬」在 Fish Game 中的體現。

- **デス・ガン討伐戰（Boss 三階段系統）**
  3回クリア→デス・ガンバトル的結構可轉化為 Boss 的「三階段弱體化」系統：Boss 魚出場時有3層護盾，玩家需要先在限時內打掉3隻「護衛魚」（對應3次スナイパーチャンス成功），每打掉一隻護衛魚 Boss 就去掉一層護盾。3層護盾全部去掉後 Boss 進入「弱體化狀態」（對應デス・ガンバトル），此時攻擊 Boss 的傷害 ×5，而且 Boss 移動速度變慢。如果弱體化期間（約10秒）成功擊殺 Boss → 進入「フルダイブ Mode」（全場魚倍率 ×3 持續30秒）。

  **舉例：** Boss「デス・ガン」出現在場中央，被3層紫色護盾包圍（完全無敵）。同時3隻護衛魚從三個方向游出。玩家集中火力打右邊的護衛魚 — 擊殺！「SHIELD DOWN 1/3」。其他玩家也在打 — 第2隻倒了！「SHIELD DOWN 2/3」。最後一隻！全場火力集中...擊殺！「ALL SHIELDS DOWN! WEAKNESS EXPOSED!」Boss 護盾碎裂，開始緩慢移動且發出紅光。全場玩家瘋狂射擊 Boss — 10秒內成功擊殺！「FULL DIVE MODE ACTIVATED!」全場進入30秒的超級狂歡模式。

### 本月新增設計概念：位置判定型抽選

SAO Ⅱ 的バレットサークルシステム開創了パチスロ的新維度 —「位置」成為抽選結果的決定因素。這與傳統的「組合」（什麼圖案排列在一起）是完全不同的軸線，在 Slot/Fish 領域也具有巨大的移植潛力：

| 平台 | 傳統方式 | 位置判定方式（新） |
|------|----------|-------------------|
| パチスロ | 中段に7が揃えば大当り | リール上のサークル位置に図柄が停止すれば恩恵 |
| Slot Game | Pay Line 上に同じシンボル並び | 照準圈の位置にWild/Scatter停止で倍率UP |
| Fish Game | 魚に弾が当たれば倍率判定 | 照準圈内で撃殺すれば追加倍率 |

> 從パチスロ提取設計概念時，核心是將「狀態遷移＋期待感演出＋射幸性數學模型」三位一體的框架，轉化為目標平台的形式。本月的SAO Ⅱ 新增了「位置判定」這個第四維度，值得所有遊戲設計師關注。

function buildTOC() {
  const headings = content.querySelectorAll('h1,h2,h3');
  if (!headings.length) { toc.style.display = 'none'; return; }
  let s = '<h3>目次</h3>';
  headings.forEach((el, i) => {

  });
  toc.innerHTML = s;
}

function wrapAnalysisSections() {
  const paragraphs = content.querySelectorAll('p');
  paragraphs.forEach(p => {
    const strong = p.querySelector('strong');
    if (!strong) return;
    const text = strong.textContent;
    let className = null;
    if (text.includes('Slot Game 轉用分析')) className = 'slot-analysis';
    else if (text.includes('Fish Game 轉用分析')) className = 'fish-analysis';
    if (!className) return;
    const wrapper = document.createElement('div');
    wrapper.className = className;
    let sibling = p.nextElementSibling;
    const collected = [];
    while (sibling && !['H2','H3','HR'].includes(sibling.tagName) && !sibling.querySelector('strong[class]')) {
      const strongInside = sibling.querySelector('strong');
      if (strongInside && (strongInside.textContent.includes('Slot Game 轉用分析') || strongInside.textContent.includes('Fish Game 轉用分析'))) break;
      collected.push(sibling);
      sibling = sibling.nextElementSibling;
    }
    p.parentNode.insertBefore(wrapper, p);
    wrapper.appendChild(p);
    collected.forEach(el => wrapper.appendChild(el));
  });
}

function wrapExamples() {
  content.querySelectorAll('strong').forEach(strong => {
    if (!strong.textContent.includes('舉例')) return;
    const p = strong.closest('p');
    if (!p || p.closest('.example-block')) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'example-block';
    p.parentNode.insertBefore(wrapper, p);
    wrapper.appendChild(p);
  });
}

function render() {

// Hash-based scroll: scroll to heading containing the hash text
function scrollToHash() {
  const hash = decodeURIComponent(window.location.hash.slice(1));
  if (!hash) return;
  const normalizedHash = hash.replace(/[\s\-]+/g, '');
  const headings = content.querySelectorAll('h1,h2,h3');
  for (const el of headings) {
    const normalizedText = el.textContent.replace(/[\s\-]+/g, '');
    if (normalizedText.includes(normalizedHash)) {

        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        el.style.transition = 'background 0.3s';
        el.style.background = '#fff3cd';
        setTimeout(() => { el.style.background = ''; }, 2000);
      }, 300);
      return;
    }
  }
}
scrollToHash();
